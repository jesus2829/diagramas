<title>Arquitectura AWS — Marketplace de Hospedaje</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1117;
    font-family: 'Amazon Ember', 'Segoe UI', sans-serif;
    color: #e8eaf0;
    min-height: 100vh;
    padding: 24px;
  }
  .page-title {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }
  .page-sub {
    text-align: center;
    font-size: 12px;
    color: #7c8490;
    margin-bottom: 20px;
  }
  .diagram {
    position: relative;
    width: 1280px;
    margin: 0 auto;
  }
  /* ── SVG canvas ─────────────────────────────── */
  .arch-svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* ── Domain containers ──────────────────────── */
  .domain-box {
    rx: 10;
    fill: none;
    stroke-width: 1.5;
    stroke-dasharray: 6 3;
  }
  .domain-label {
    font-size: 11px;
    font-weight: 700;
    font-family: 'Amazon Ember', 'Segoe UI', sans-serif;
    letter-spacing: 0.8px;
  }

  /* ── Service cards ──────────────────────────── */
  .svc-card {
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
    cursor: pointer;
    transition: filter 0.2s;
  }
  .svc-card:hover {
    filter: drop-shadow(0 4px 14px rgba(255,153,0,0.35));
  }
  .svc-label {
    font-size: 9.5px;
    font-weight: 600;
    font-family: 'Amazon Ember', 'Segoe UI', sans-serif;
    text-anchor: middle;
    fill: #e8eaf0;
  }
  .svc-sublabel {
    font-size: 8px;
    font-family: 'Amazon Ember', 'Segoe UI', sans-serif;
    text-anchor: middle;
    fill: #8a9bb0;
  }

  /* ── Arrows ─────────────────────────────────── */
  .arrow-sync  { stroke: #4db8ff; stroke-width: 1.5; fill: none; }
  .arrow-async { stroke: #ff9a3c; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
  .arrow-event { stroke: #e84d9e; stroke-width: 1.5; fill: none; stroke-dasharray: 5 3; }
  .arrow-data  { stroke: #3ecf8e; stroke-width: 1.5; fill: none; }
  .arrow-label {
    font-size: 8px;
    font-family: 'Amazon Ember', 'Segoe UI', sans-serif;
    fill: #7c8490;
  }

  /* ── Performance badge ──────────────────────── */
  .perf-badge {
    font-size: 12px;
    font-weight: 800;
    font-family: 'Amazon Ember', 'Segoe UI', sans-serif;
    fill: #3ecf8e;
  }
  .perf-sub {
    font-size: 9px;
    font-family: 'Amazon Ember', 'Segoe UI', sans-serif;
    fill: #3ecf8e;
  }
</style>
</head>
